services:
  mongo-db:
    image: mongo:7
    container_name: mazerun-mongo-db
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    # restart: always

  mongo-app:
    build: .
    container_name: mazerun-mongo-app
    depends_on:
      - mongo-db
    volumes:
      - ./config.yaml:/app/config.yaml
    # restart: always
    environment:
      - MONGO_URI=mongodb://mongo-db:27017

volumes:
  mongo_data:
